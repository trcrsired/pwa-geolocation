<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PWA Geolocation</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">

  <meta name="color-scheme" content="light dark">
</head>
<body>

<h1>PWA Geolocation</h1>

<div class="unit-toggle">
  <label><input type="radio" name="unit" value="metric" checked> m/s & km/h</label>
  <label><input type="radio" name="unit" value="imperial"> mph</label>
</div>

<div class="accuracy-toggle">
  <label>
    <input type="checkbox" id="highAccuracy" checked>
    High Accuracy
  </label>
</div>

<div class="value">Speed: <span id="speed">0</span></div>

<h3>Real‑time Coordinates</h3>
<div>Timestamp: <span id="ts">-</span></div>
<div>Latitude: <span id="lat">-</span></div>
<div>Longitude: <span id="lon">-</span></div>
<div>Altitude: <span id="alt">-</span></div>
<div>Accuracy: <span id="acc">-</span> m</div>
<div>Location Name: <span id="place">Unknown location</span></div>

<h3>Raw Position Data</h3>
<pre id="raw"></pre>

<footer>
  <p>
    <a href="https://github.com/trcrsired/pwa-geolocation" target="_blank">
      GitHub: trcrsired/pwa-geolocation
    </a>
  </p>
  <p>License: GPL‑3.0</p>
  <p id="year"></p>
</footer>

<script src="app.js"></script>
<script src="sw-register.js"></script>

<script>
  const startYear = 2026;
  const currentYear = new Date().getFullYear();
  document.getElementById("year").textContent =
    startYear === currentYear ? `${currentYear}` : `${startYear}–${currentYear}`;
</script>

</body>
</html>
